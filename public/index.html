let fBtn='';if(!isSelf&&p.friendship){const fs=p.friendship;if(fs.status==='none')fBtn=`<button class="btn btn-primary btn-sm" onclick="sendFR('${userId}')">+ Add Friend</button>`;else if(fs.status==='pending'&&fs.is_receiver)fBtn=`<button class="btn btn-success btn-sm" onclick="respondFR('${fs.friendship_id}',true)">Accept</button>`;else if(fs.status==='pending')fBtn=`<button class="btn btn-ghost btn-sm" disabled>Pending</button>`;else if(fs.status==='accepted')fBtn=`<button class="btn btn-ghost btn-sm" onclick="openChat('${userId}')">💬 Message</button> <button class="btn btn-danger btn-sm" onclick="if(confirm('Remove?'))api('/api/friends/${userId}',{method:'DELETE'}).then(()=>{toast('Removed');viewProfile('${userId}')})">Remove</button>`}
el.innerHTML=`<div class="profile-card">${isSelf?`<button class="btn btn-ghost btn-sm edit-btn" onclick="openEditProfile()">✎ Edit</button>`:''}<div style="display:flex;justify-content:center">${av(p,'av-xl')}</div><div class="profile-name">${esc(p.display_name||p.username)}</div><div class="profile-handle">@${p.username}</div>${p.bio?`<div class="profile-bio">${esc(p.bio)}</div>`:''}<div class="profile-belt"><span class="belt-dot ${bc(belt)}"></span><span style="font-size:.85rem;font-weight:600;text-transform:capitalize">${belt}</span><span style="font-size:.7rem;color:var(--tx3);font-family:'JetBrains Mono',monospace;letter-spacing:2px">${dots}</span></div>${p.gym?`<div style="font-size:.78rem;color:var(--tx3);margin-top:.2rem">📍 ${esc(p.gym)}</div>`:''}<div class="profile-stats"><div class="ps-stat"><div class="ps-stat-v">${p.post_count||0}</div><div class="ps-stat-l">Posts</div></div><div class="ps-stat"><div class="ps-stat-v">${p.total_hours||0}</div><div class="ps-stat-l">Hours</div></div><div class="ps-stat"><div class="ps-stat-v">${p.friend_count||0}</div><div class="ps-stat-l">Friends</div></div></div>${fBtn?`<div class="profile-actions">${fBtn}</div>`:''}</div><div class="profile-tabs"><button class="profile-tab active" data-ptab="posts" onclick="profTab(this,'posts','${userId}')">Posts</button><button class="profile-tab" data-ptab="sessions" onclick="profTab(this,'sessions','${userId}')">Sessions</button>${isSelf?`<button class="profile-tab" data-ptab="friends" onclick="profTab(this,'friends','${userId}')">Friends</button>`:''}</div><div id="prof-tab" style="padding-top:12px"></div>`;
if(isSelf)el.querySelector('.profile-card').insertAdjacentHTML('beforeend',`<div class="profile-actions" style="margin-top:.3rem"><button class="btn btn-danger btn-sm" onclick="logout()">Sign Out</button></div>`);
profTab(el.querySelector('[data-ptab="posts"]'),'posts',userId)}
function profTab(btn,tab,uid){document.querySelectorAll('.profile-tab').forEach(t=>{t.classList.remove('active')});if(btn)btn.classList.add('active');if(tab==='posts')loadProfPosts(uid);else if(tab==='sessions')loadProfSessions(uid);else if(tab==='friends')loadProfFriends()}
async function loadProfPosts(uid){const posts=await api(`/api/posts/user/${uid}`);const el=document.getElementById('prof-tab');el.innerHTML=posts.length?posts.map(p=>renderPost(p)).join(''):'<div class="empty"><p>No posts yet</p></div>';setTimeout(()=>posts.forEach(p=>loadCmts(p.id)),50)}
async function loadProfSessions(uid){const s=await api(`/api/sessions?user_id=${uid}`);document.getElementById('prof-tab').innerHTML=s.length?s.map(x=>`<div class="log-item" onclick="viewLogDetail('${x.id}')"><div class="log-date">${x.session_date}</div><div class="log-info"><div class="log-title">${x.session_duration}min · ${x.session_sparring||0} rnds</div><div class="log-detail">${esc(x.feeling||(x.session_techniques||[]).slice(0,3).join(', ')||'No details')}</div></div></div>`).join(''):'<div class="empty"><p>No public sessions</p></div>'}
async function loadProfFriends(){const pending=await api('/api/friends/pending');const friends=await api('/api/friends');let html='';if(pending.length){html+=`<div class="section-title" style="margin-bottom:.3rem">Pending Requests (${pending.length})</div>`;html+=pending.map(f=>`<div class="friend-item">${av(f,'av-s')}<div class="fi-info"><div class="fi-name">${esc(f.display_name||f.username)}</div><div class="fi-detail">@${f.username}</div></div><div class="fi-actions"><button class="btn btn-success btn-sm" onclick="event.stopPropagation();respondFR('${f.friendship_id}',true)">Accept</button><button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();respondFR('${f.friendship_id}',false)">✕</button></div></div>`).join('')}
html+=`<div class="section-title" style="margin-top:.6rem;margin-bottom:.3rem">Friends (${friends.length})</div>`;
html+=`<div class="top-search" style="margin-bottom:.6rem;position:relative"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input placeholder="Search people to add..." oninput="profFriendSearch(this.value)"></div><div id="prof-friend-search"></div>`;
html+=friends.length?friends.map(f=>`<div class="friend-item" onclick="viewProfile('${f.id}')">${av(f,'av-s')}<div class="fi-info"><div class="fi-name">${esc(f.display_name||f.username)} <span class="belt-dot ${bc(f.belt)}"></span></div><div class="fi-detail">@${f.username}${f.gym?' · '+esc(f.gym):''}</div></div><button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openChat('${f.id}')">💬</button></div>`).join(''):'<div class="empty"><p>No friends yet. Search above!</p></div>';
document.getElementById('prof-tab').innerHTML=html}
async function profFriendSearch(q){const el=document.getElementById('prof-friend-search');if(q.length<2){el.innerHTML='';return}const u=await api(`/api/users/search?q=${encodeURIComponent(q)}`);el.innerHTML=u.map(u=>`<div class="friend-item">${av(u,'av-s')}<div class="fi-info"><div class="fi-name">${esc(u.display_name||u.username)} <span class="belt-dot ${bc(u.belt)}"></span></div><div class="fi-detail">@${u.username}</div></div><button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();sendFR('${u.id}')">+ Add</button></div>`).join('')}

function openEditProfile(){openModal('Edit Profile',`<div class="field"><label>Display Name</label><input id="ep-name" value="${esc(ME.display_name||'')}"></div><div class="field"><label>Bio</label><textarea id="ep-bio">${esc(ME.bio||'')}</textarea></div><div class="field"><label>Gym</label><input id="ep-gym" value="${esc(ME.gym||'')}"></div><div class="grid2"><div class="field"><label>Belt</label><select id="ep-belt">${['white','blue','purple','brown','black'].map(b=>`<option value="${b}"${ME.belt===b?' selected':''}>${b}</option>`).join('')}</select></div><div class="field"><label>Stripes</label><select id="ep-stripes">${[0,1,2,3,4].map(n=>`<option value="${n}"${ME.stripes==n?' selected':''}>${n}</option>`).join('')}</select></div></div><div class="field"><label>Start Date</label><input type="date" id="ep-start" value="${ME.start_date||''}"></div><div class="field"><label>Avatar</label><input type="file" id="ep-av-file" accept="image/*"></div><div class="toggle-row"><span class="toggle-label">Public profile?</span><label class="toggle"><input type="checkbox" id="ep-pub"${ME.profile_public?' checked':''}><span class="toggle-track"></span></label></div><button class="btn btn-primary" onclick="saveProfile()">Save</button>`)}
async function saveProfile(){const af=document.getElementById('ep-av-file').files[0];if(af){try{const r=await upload('/api/profile/avatar',af);ME.avatar_url=r.url}catch(e){}}const d={display_name:document.getElementById('ep-name').value,bio:document.getElementById('ep-bio').value,gym:document.getElementById('ep-gym').value,belt:document.getElementById('ep-belt').value,stripes:parseInt(document.getElementById('ep-stripes').value),start_date:document.getElementById('ep-start').value,profile_public:document.getElementById('ep-pub').checked?1:0};await api('/api/profile',{method:'PUT',body:d});Object.assign(ME,d);closeModal();toast('Updated! 🤙');viewProfile(ME.id);const a=document.getElementById('feed-av');if(ME.avatar_url)a.innerHTML=`<img src="${ME.avatar_url}">`;else a.textContent=(ME.display_name||ME.username||'?')[0].toUpperCase()}
async function findUser(username){const r=await api(`/api/users/search?q=${encodeURIComponent(username)}`);const u=r.find(x=>x.username.toLowerCase()===username.toLowerCase());if(u)viewProfile(u.id);else toast('User not found',true)}

// ═══ MODAL ═══
function openModal(t,h){document.getElementById('modal-inner').innerHTML=`<div class="modal-title">${t}</div>${h}`;document.getElementById('modal-bg').classList.add('open')}
function closeModal(){document.getElementById('modal-bg').classList.remove('open')}

// ═══ BOOT ═══
if(TOKEN)initApp();else{document.getElementById('auth-screen').style.display='flex';document.getElementById('main-app').style.display='none'}
</script>
</body>
</html>
