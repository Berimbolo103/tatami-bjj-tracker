<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TATAMI Admin</title>
<style>
:root{--bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--border:#1e1e1e;--border2:#2a2a2a;--text:#f0ece4;--text2:#a89f94;--text3:#5c5650;--red:#e63946;--green:#52b788;--gold:#c9a84c;--radius:10px;--font:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:var(--font);padding:1rem;max-width:900px;margin:0 auto}
h1{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--red);margin-bottom:.25rem}
.sub{color:var(--text3);font-size:.8rem;font-family:var(--mono);margin-bottom:1.5rem}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:.75rem}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.75rem;margin-bottom:1.5rem}
.stat-label{font-size:.65rem;font-family:var(--mono);letter-spacing:.1em;color:var(--text3);text-transform:uppercase}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:2rem;line-height:1}
.field{margin-bottom:1rem}.field label{display:block;font-size:.75rem;color:var(--text3);margin-bottom:.3rem}
.field input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:.5rem;color:var(--text);font-size:.9rem}
.btn{padding:.5rem 1rem;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);border-radius:6px;cursor:pointer;font-size:.8rem;margin-right:.3rem}
.btn:hover{border-color:var(--text3)}.btn-approve{color:var(--green);border-color:var(--green)}.btn-reject{color:var(--red);border-color:var(--red)}
table{width:100%;border-collapse:collapse}th,td{padding:.5rem;text-align:left;border-bottom:1px solid var(--border);font-size:.82rem}
th{color:var(--text3);font-family:var(--mono);font-size:.7rem;text-transform:uppercase;letter-spacing:.08em}
.status{font-size:.72rem;padding:.15rem .5rem;border-radius:99px;font-family:var(--mono)}
.status.approved{background:rgba(82,183,136,.15);color:var(--green)}.status.pending{background:rgba(232,160,32,.15);color:#e8a020}.status.rejected{background:rgba(230,57,70,.15);color:var(--red)}
#login-box{max-width:320px;margin:4rem auto}
</style>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
<div id="login-box">
  <h1>TATAMI ADMIN</h1>
  <div class="sub">admin panel</div>
  <div class="field"><label>Admin Token</label><input type="password" id="token-input" placeholder="Enter admin token..."></div>
  <button class="btn" onclick="loginAdmin()">Enter</button>
</div>
<div id="admin-panel" style="display:none">
  <h1>TATAMI ADMIN</h1>
  <div class="sub">dashboard</div>
  <div class="grid" id="stats"></div>
  <h2 style="font-family:'Bebas Neue';font-size:1.4rem;margin-bottom:.5rem;color:var(--gold)">Pending Submissions</h2>
  <div id="submissions"></div>
  <h2 style="font-family:'Bebas Neue';font-size:1.4rem;margin:1rem 0 .5rem;color:var(--gold)">All Techniques</h2>
  <div id="techniques" style="max-height:400px;overflow-y:auto"></div>
</div>
<script>
let ADMIN_TOKEN='';
const API='';
async function adminApi(path,opts={}){
  const h={'Content-Type':'application/json','x-admin-token':ADMIN_TOKEN};
  const r=await fetch(API+path,{method:opts.method||'GET',headers:h,body:opts.body?JSON.stringify(opts.body):undefined});
  return r.json();
}
function loginAdmin(){
  ADMIN_TOKEN=document.getElementById('token-input').value;
  adminApi('/api/admin/stats').then(s=>{
    if(s.error){alert('Invalid token');return}
    document.getElementById('login-box').style.display='none';
    document.getElementById('admin-panel').style.display='block';
    loadAdmin();
  });
}
async function loadAdmin(){
  const s=await adminApi('/api/admin/stats');
  document.getElementById('stats').innerHTML=Object.entries(s).map(([k,v])=>`<div class="card"><div class="stat-label">${k.replace(/([A-Z])/g,' $1')}</div><div class="stat-val">${v}</div></div>`).join('');
  const subs=await adminApi('/api/admin/submissions');
  const pending=subs.filter(s=>s.status==='pending');
  document.getElementById('submissions').innerHTML=pending.length?`<table><tr><th>Name</th><th>Category</th><th>By</th><th>Actions</th></tr>${pending.map(s=>`<tr><td>${s.name}</td><td>${s.category}</td><td>${s.submitted_by}</td><td><button class="btn btn-approve" onclick="approveSub(${s.id})">✓</button><button class="btn btn-reject" onclick="rejectSub(${s.id})">✗</button></td></tr>`).join('')}</table>`:'<p style="color:var(--text3)">No pending submissions.</p>';
  const techs=await adminApi('/api/admin/techniques');
  document.getElementById('techniques').innerHTML=`<table><tr><th>Name</th><th>Category</th><th>Status</th><th></th></tr>${techs.slice(0,100).map(t=>`<tr><td>${t.name}</td><td>${t.category}</td><td><span class="status ${t.status}">${t.status}</span></td><td><button class="btn btn-reject" onclick="deleteTech(${t.id})">Del</button></td></tr>`).join('')}</table>`;
}
async function approveSub(id){await adminApi(`/api/admin/submissions/${id}/approve`,{method:'PUT'});loadAdmin()}
async function rejectSub(id){const r=prompt('Rejection reason:');await adminApi(`/api/admin/submissions/${id}/reject`,{method:'PUT',body:{reason:r||''}});loadAdmin()}
async function deleteTech(id){if(!confirm('Delete?'))return;await adminApi(`/api/admin/techniques/${id}`,{method:'DELETE'});loadAdmin()}
</script>
</body>
</html>
