<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Rollbook Admin</title>
<style>
:root{--bg:#0b0b0b;--bg2:#131313;--bg3:#1b1b1b;--bdr:#1a1a1a;--bdr2:#272727;--tx:#f2efea;--tx2:#a8a29e;--tx3:#6b6560;--fc:#FC4C02;--grn:#40b87c;--gold:#d4a34a;--r:12px;--f:'Outfit',sans-serif;--m:'JetBrains Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--tx);font-family:var(--f);padding:1rem;max-width:900px;margin:0 auto}
h1{font-weight:800;font-size:1.8rem;margin-bottom:.2rem}h1 span{color:var(--fc)}
.sub{color:var(--tx3);font-size:.78rem;font-family:var(--m);margin-bottom:1.5rem}
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:1rem;margin-bottom:.6rem}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:.6rem;margin-bottom:1.5rem}
.sl{font-size:.6rem;font-family:var(--m);letter-spacing:.1em;color:var(--tx3);text-transform:uppercase}
.sv{font-weight:800;font-size:1.8rem;line-height:1}
.field{margin-bottom:.8rem}.field label{display:block;font-size:.7rem;color:var(--tx3);margin-bottom:.2rem}
.field input{width:100%;background:var(--bg3);border:1px solid var(--bdr2);border-radius:8px;padding:.45rem;color:var(--tx);font-size:.85rem}
.btn{padding:.4rem .8rem;border:1px solid var(--bdr2);background:var(--bg3);color:var(--tx2);border-radius:8px;cursor:pointer;font-size:.78rem;margin-right:.2rem}.btn:hover{border-color:var(--tx3)}
.btn-a{color:var(--grn);border-color:var(--grn)}.btn-r{color:#e54;border-color:#e54}
table{width:100%;border-collapse:collapse}th,td{padding:.45rem;text-align:left;border-bottom:1px solid var(--bdr);font-size:.8rem}
th{color:var(--tx3);font-family:var(--m);font-size:.65rem;text-transform:uppercase;letter-spacing:.06em}
.st{font-size:.68rem;padding:2px 6px;border-radius:99px;font-family:var(--m)}
.st.ok{background:rgba(64,184,124,.12);color:var(--grn)}.st.pend{background:rgba(252,76,2,.1);color:var(--fc)}.st.rej{background:rgba(238,85,68,.1);color:#e54}
#login-box{max-width:320px;margin:4rem auto}
</style>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
<div id="login-box"><h1>Roll<span>book</span></h1><div class="sub">admin panel</div><div class="field"><label>Admin Token</label><input type="password" id="tok"></div><button class="btn" onclick="login()">Enter</button></div>
<div id="panel" style="display:none"><h1>Roll<span>book</span> Admin</h1><div class="sub">dashboard</div><div class="grid" id="stats"></div><h2 style="font-weight:700;font-size:1.1rem;color:var(--gold);margin-bottom:.4rem">Pending Submissions</h2><div id="subs"></div><h2 style="font-weight:700;font-size:1.1rem;color:var(--gold);margin:1rem 0 .4rem">All Techniques</h2><div id="techs" style="max-height:400px;overflow-y:auto"></div></div>
<script>
let AT='';const A='';
async function aa(p,o={}){const h={'Content-Type':'application/json','x-admin-token':AT};return(await fetch(A+p,{method:o.method||'GET',headers:h,body:o.body?JSON.stringify(o.body):undefined})).json()}
function login(){AT=document.getElementById('tok').value;aa('/api/admin/stats').then(s=>{if(s.error){alert('Invalid');return}document.getElementById('login-box').style.display='none';document.getElementById('panel').style.display='block';load()})}
async function load(){const s=await aa('/api/admin/stats');document.getElementById('stats').innerHTML=Object.entries(s).map(([k,v])=>`<div class="card"><div class="sl">${k.replace(/([A-Z])/g,' $1')}</div><div class="sv">${v}</div></div>`).join('');const sub=await aa('/api/admin/submissions');const pend=sub.filter(s=>s.status==='pending');document.getElementById('subs').innerHTML=pend.length?`<table><tr><th>Name</th><th>Category</th><th>By</th><th></th></tr>${pend.map(s=>`<tr><td>${s.name}</td><td>${s.category}</td><td>${s.submitted_by}</td><td><button class="btn btn-a" onclick="apr(${s.id})">✓</button><button class="btn btn-r" onclick="rej(${s.id})">✗</button></td></tr>`).join('')}</table>`:'<p style="color:var(--tx3)">None pending</p>';const t=await aa('/api/admin/techniques');document.getElementById('techs').innerHTML=`<table><tr><th>Name</th><th>Cat</th><th>Status</th><th></th></tr>${t.slice(0,100).map(t=>`<tr><td>${t.name}</td><td>${t.category}</td><td><span class="st ${t.status==='approved'?'ok':t.status==='pending'?'pend':'rej'}">${t.status}</span></td><td><button class="btn btn-r" onclick="del(${t.id})">Del</button></td></tr>`).join('')}</table>`}
async function apr(id){await aa(`/api/admin/submissions/${id}/approve`,{method:'PUT'});load()}
async function rej(id){const r=prompt('Reason:');await aa(`/api/admin/submissions/${id}/reject`,{method:'PUT',body:{reason:r||''}});load()}
async function del(id){if(!confirm('Delete?'))return;await aa(`/api/admin/techniques/${id}`,{method:'DELETE'});load()}
</script></body></html>
